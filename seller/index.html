<!DOCTYPE html>
<html lang="ar">

<head>
  <meta charset="UTF-8">
  <title>Vendra | Seller Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="../assets/vendra.png">


  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">


  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">


  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>


  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../utils/errorHandler.js" type="module"></script>
</head>

<body>
  <div class="modal fade" id="confirmModal" tabindex="-1">
  </div>
  <div class="container-fluid">
    <div class="row">


      <nav class="col-2 shadow-sm vh-100 p-3 d-none d-md-block">
        <div class="d-flex align-items-center gap-2 mb-4">
          <h5 class="mb-0">Seller Portal</h5>
        </div>

        <ul class="nav flex-column sidebar-nav">
          <li class="nav-item active" data-page="overview"><i class="fas fa-chart-pie"></i> Overview</li>
          <li class="nav-item" data-page="products"><i class="fas fa-box"></i> Products</li>
          <li class="nav-item" data-page="orders"><i class="fas fa-shopping-cart"></i> Orders</li>
          <li class="nav-item" data-page="analytics"><i class="fas fa-chart-line"></i> Analytics</li>
          <li id="backBtn" class="nav-item back" data-page="back"><i class="fas fa-sign-out-alt"></i> Back to store</li>
        </ul>
      </nav>

      <div class="col-12 col-md-10">


        <header class="d-flex justify-content-between align-items-center p-3 border-bottom">

          <div class="d-flex align-items-center gap-2">

            <button class="btn btn-dark d-md-none" data-bs-toggle="offcanvas" data-bs-target="#mobileSidebar">
              <i class="fas fa-bars"></i>
            </button>

            <h3 id="pageTitle" class="mb-0">Overview</h3>
          </div>

          <div class="d-flex align-items-center gap-2">
            <img src="https://placehold.net/avatar.png" width="40">
            <div>
              <div>Welcome back</div>
              <strong id="sellerName"></strong>
            </div>
          </div>

        </header>

        <main class=" p-3" style="min-height: 80vh;">
          <div id="content"></div>
        </main>

      </div>

    </div>
  </div>

  <div class="offcanvas offcanvas-start " tabindex="-1" id="mobileSidebar">

    <div class="offcanvas-header">
      <h5 class="offcanvas-title d-flex align-items-center gap-2">
        Seller Portal
      </h5>
      <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>

    <div class="offcanvas-body p-3 overflow-hidden">
      <ul class="nav flex-column sidebar-nav">
        <li class="nav-item active" data-page="overview"><i class="fas fa-chart-pie"></i> Overview</li>
        <li class="nav-item" data-page="products"><i class="fas fa-box"></i> Products</li>
        <li class="nav-item" data-page="orders"><i class="fas fa-shopping-cart"></i> Orders</li>
        <li class="nav-item" data-page="analytics"><i class="fas fa-chart-line"></i> Analytics</li>
        <li class="nav-item" data-page="back"><i class="fas fa-sign-out-alt"></i> Back to store</li>
      </ul>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>

</html>

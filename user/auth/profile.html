<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />

    <!-- Font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="../../assets/css/global.css">
  </head>

  <body id="container" class="d-flex flex-column justify-content-between min-vh-100">

    <div class="container py-5">
      <div class="row g-4">

        <!-- LEFT SIDE -->
        <div class="col-md-4">
          <div class="card profile-card shadow-sm text-center p-4">
            <img id="profileAvatar"
                 src="../../assets/images/no_image.png"
                 class="rounded-circle mx-auto mb-3 profile-avatar">

            <h4 id="profileName"></h4>
            <p class="text-muted" id="profileEmail"></p>

            <button class="btn btn-primary w-100 mt-3"
                    data-bs-toggle="modal"
                    data-bs-target="#editProfileModal">
              <i class="bi bi-pencil-square"></i> Edit Profile
            </button>

            <button id="deleteBtn"
                    class="btn btn-outline-danger w-100 mt-2">
              <i class="bi bi-trash"></i> Delete Account
            </button>
          </div>
        </div>

        <!-- RIGHT SIDE -->
        <div class="col-md-8">

          <!-- Account Information -->
          <div class="card shadow-sm mb-4">
            <div class="card-header fw-bold">Account Information</div>
            <div class="card-body">
              <p><span class="info-label">Phone:</span> <span id="profilePhone"></span></p>
              <p>
                <span class="info-label">Location:</span>
                <span id="profileLocation"></span>
              </p>
              <p><span class="info-label">Joined:</span> <span id="profileJoinDate"></span></p>
            </div>
          </div>

          <!-- Shopping Summary -->
          <div class="card shadow-sm">
            <div class="card-header fw-bold">Shopping Summary</div>
            <div class="card-body">
              <div class="row text-center g-3">
                <div class="col-md-6">
                  <div class="stat-box">
                    <h4 id="ordersCount">0</h4>
                    <small class="text-muted">Orders</small>
                  </div>
                </div>

                <div class="col-md-6">
                  <div class="stat-box">
                    <h4 id="cartCount">0</h4>
                    <small class="text-muted">Cart Items</small>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Orders List -->
          <div class="card shadow-sm mt-4">
            <div class="card-header fw-bold">My Orders</div>
            <div class="card-body">
              <div id="ordersList"></div>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- ================= Edit Profile Modal ================= -->
    <div class="modal fade" id="editProfileModal" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title">Edit Profile</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <form id="profileForm" novalidate>

              <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" name="name" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" name="email" class="form-control" required>
              </div>

              <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" name="phone" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">Address</label>
                <input type="text" name="address" placeholder="Enter your address" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">City</label>
                <input type="text" name="city" placeholder="Enter your city" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">State</label>
                <input type="text" name="state" placeholder="Enter you state" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">Zip Code</label>
                <input type="text" name="zipcode" placeholder="Enter you zipcode" class="form-control">
              </div>

              <div class="mb-3">
                <label class="form-label">Profile Image</label>
                <input type="file" name="image" class="form-control" accept="image/*">
                <img id="imagePreview"
                     class="mt-3 rounded"
                     style="max-width:100%;display:none;">
              </div>

              <button type="submit" class="btn btn-primary w-100">
                Save Changes
              </button>

            </form>
          </div>

        </div>
      </div>
    </div>

    <!-- ================= Confirm Delete Modal ================= -->
    <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

          <div class="modal-header">
            <h5 class="modal-title text-danger">
              <i class="bi bi-exclamation-triangle"></i>
              Confirm Delete
            </h5>
            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            Are you sure you want to delete your account?
            <br>
            <strong>This action cannot be undone.</strong>
          </div>

          <div class="modal-footer">
            <button type="button"
                    class="btn btn-secondary"
                    data-bs-dismiss="modal">
              Cancel
            </button>

            <button type="button"
                    class="btn btn-danger"
                    id="confirmDeleteBtn">
              Yes, Delete
            </button>
          </div>

        </div>
      </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <script type="module" src="./static/profile.js"></script>

  </body>
</html>

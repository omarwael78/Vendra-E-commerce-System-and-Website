<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
            content="width=device-width, initial-scale=1.0">

        <title>Reset Password</title>

        <link rel="icon"
            type="image/x-icon"
            href="/assets/vendra.png">

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"
                crossorigin="anonymous"></script>

        <!-- Bootstrap CSS & JS -->
        <link rel="stylesheet"
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            crossorigin="anonymous">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
                crossorigin="anonymous"></script>

        <!-- Font Awesome -->
        <link rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
            crossorigin="anonymous" referrerpolicy="no-referrer" />

        <!-- Styles -->
        <link rel="stylesheet" href="../../assets/css/global.css">
        <link rel="stylesheet" href="./auth.css">

        <!-- Page Script -->
        <script type="module" src="./static/reset.js"></script>

    </head>
    <body id="container" class="d-flex flex-column justify-content-between min-vh-100">

        <div class="container d-flex justify-content-center align-items-center">
            <div class="w-100" style="max-width: 520px;">

                <!-- ===== Header ===== -->
                <div class="text-center mb-4">
                    <div class="bg-primary rounded-circle d-flex justify-content-center align-items-center mx-auto mb-3"
                        style="width:70px; height:70px;">
                        <i class="fa-regular fa-envelope fs-4"></i>
                    </div>

                    <h2 class="fw-bold">Reset Password</h2>
                    <p class="text-muted">Enter your email to receive reset instructions</p>
                </div>

                <!-- ===== Card ===== -->
                <div class="card border-0 shadow-sm rounded-4">
                    <div class="card-body p-4">

                        <form id="resetForm" method="post">

                            <!-- Email -->
                            <div class="mb-4">
                                <label class="form-label fw-semibold">Email Address</label>
                                <div class="input-group has-validation">
                                    <span class="input-group-text border-end-0">
                                        <i class="fa-regular fa-envelope text-muted"></i>
                                    </span>

                                    <input type="email"
                                        class="form-control border-start-0"
                                        name="email"
                                        placeholder="Enter Your Email"
                                        required>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>
                                </div>
                            </div>

                            <!-- Submit -->
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-primary py-2">Send Reset Link</button>
                            </div>

                            <div class="text-center">
                                <a href="./login.html" class="text-decoration-none small">Back to Sign In</a>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>

    </body>
</html>

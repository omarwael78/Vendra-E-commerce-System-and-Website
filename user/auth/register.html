<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">

        <title>Register</title>

        <link rel="icon"
              type="image/x-icon"
              href="/assets/vendra.png">

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

        <!-- Bootstrap -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

        <!-- Font Awesome -->
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

        <!-- Global Styles -->
        <link rel="stylesheet"
              href="../../assets/css/global.css">

        <link rel="stylesheet"
              href="./auth.css">

        <!-- Page Script -->
        <script type="module"
                src="./static/register.js"></script>

    </head>
    <body id="container">

        <div class="container min-vh-100 d-flex justify-content-center align-items-center">

            <div class="w-100"
                 style="max-width: 520px;">

                <!-- ===== Header ===== -->
                <div class="text-center mb-4">

                    <div class="bg-primary rounded-circle d-flex justify-content-center align-items-center mx-auto mb-3"
                         style="width: 70px; height: 70px;">
                        <i class="fa-regular fa-user fs-4"></i>
                    </div>

                    <h2 class="fw-bold">
                        Create Account
                    </h2>

                    <p class="text-muted">
                        Join our marketplace today
                    </p>

                </div>

                <!-- ===== Card ===== -->
                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body p-4">

                        <form id="registerForm"
                              method="post"
                              novalidate>

                            <!-- ===== Role Selection ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Register As
                                </label>

                                <div class="d-flex gap-3">

                                    <button type="button"
                                            class="btn role-btn active flex-fill"
                                            data-role="customer">
                                        Customer
                                    </button>

                                    <button type="button"
                                            class="btn role-btn flex-fill"
                                            data-role="vendor">
                                        Vendor
                                    </button>

                                </div>

                            </div>

                            <!-- ===== Username ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Username
                                </label>

                                <div class="input-group has-validation">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-regular fa-user text-muted"></i>
                                    </span>

                                    <input type="text"
                                           class="form-control border-start-0"
                                           name="username"
                                           placeholder="Enter your username"
                                           required>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>

                                </div>

                            </div>

                            <!-- ===== Email ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>

                                <div class="input-group has-validation">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-regular fa-envelope text-muted"></i>
                                    </span>

                                    <input type="email"
                                           class="form-control border-start-0"
                                           name="email"
                                           placeholder="Enter your email"
                                           required>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>

                                </div>

                            </div>

                            <!-- ===== Phone ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Phone Number
                                </label>

                                <div class="input-group has-validation">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-solid fa-phone text-muted"></i>
                                    </span>

                                    <input type="tel"
                                           class="form-control border-start-0"
                                           name="phone"
                                           placeholder="Enter your phone number"
                                           required>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>

                                </div>

                            </div>

                            <!-- ===== Password ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <div class="input-group has-validation">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-solid fa-lock text-muted"></i>
                                    </span>

                                    <input type="password"
                                           class="form-control border-start-0 border-end-0"
                                           id="regPassword"
                                           name="password"
                                           placeholder="Enter your password">

                                    <button type="button"
                                            class="input-group-text border-start-0 toggle-password"
                                            data-target="regPassword">
                                        <i class="fa-regular fa-eye text-muted"></i>
                                    </button>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>

                                </div>

                            </div>

                            <!-- ===== Confirm Password ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Confirm Password
                                </label>

                                <div class="input-group has-validation">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-solid fa-lock text-muted"></i>
                                    </span>

                                    <input type="password"
                                           class="form-control border-start-0 border-end-0"
                                           id="confirmPassword"
                                           name="confirm_password"
                                           placeholder="Confirm your password">

                                    <button type="button"
                                            class="input-group-text border-start-0 toggle-password"
                                            data-target="confirmPassword">
                                        <i class="fa-regular fa-eye text-muted"></i>
                                    </button>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>

                                </div>

                            </div>

                            <!-- ===== Terms ===== -->
                            <div class="form-check mb-4">

                                <input class="form-check-input"
                                       type="checkbox"
                                       required>

                                <label class="form-check-label small">
                                    I agree to the Terms and Conditions and Privacy Policy
                                </label>

                                <div class="invalid-feedback"></div>

                            </div>

                            <!-- ===== Submit ===== -->
                            <div class="d-grid mb-3">

                                <button type="submit"
                                        class="btn btn-primary py-2">
                                    Create Account
                                </button>

                            </div>

                            <p class="text-center mt-3 small">
                                Already have an account?
                                <a href="./login.html"
                                   class="text-decoration-none">
                                    Sign in
                                </a>
                            </p>

                        </form>

                    </div>

                </div>

            </div>

        </div>

    </body>

</html>

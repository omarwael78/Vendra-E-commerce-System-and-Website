<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport"
              content="width=device-width, initial-scale=1.0">

        <title>Login</title>

        <link rel="icon"
              type="image/x-icon"
              href="/assets/vendra.png">

        <!-- jQuery -->
        <script src="https://code.jquery.com/jquery-4.0.0.min.js"></script>

        <!-- Bootstrap CSS & JS -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"></script>

        <!-- Font Awesome -->
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">

        <!-- Global Styles -->
        <link rel="stylesheet"
              href="../../assets/css/global.css">
        <link rel="stylesheet"
              href="./auth.css">

        <!-- Page Script -->
        <script type="module"
                src="./static/login.js"></script>

    </head>
    <body class="bg-body" id="container">

        <div class="container my-5 d-flex justify-content-center align-items-center">
            <div class="w-100"
                 style="max-width: 520px;">

                <!-- ===== Header ===== -->
                <div class="text-center mb-4">

                    <div class="bg-primary rounded-circle d-flex justify-content-center align-items-center mx-auto mb-3"
                         style="width: 70px; height: 70px;">
                        <i class="fa-regular fa-user fs-4"></i>
                    </div>

                    <h2 class="fw-bold">
                        Welcome Back
                    </h2>

                    <p class="text-muted">
                        Sign in to your account
                    </p>

                </div>

                <!-- ===== Card ===== -->
                <div class="card border-0 shadow-sm rounded-4">

                    <div class="card-body p-4">

                        <form id="loginForm"
                              method="post"
                              novalidate>

                            <!-- ===== Role Selection ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Login As
                                </label>

                                <div class="d-flex gap-3">

                                    <button type="button"
                                            class="btn login-btn active flex-fill"
                                            data-role="customer">
                                        Customer
                                    </button>

                                    <button type="button"
                                            class="btn login-btn flex-fill"
                                            data-role="vendor">
                                        Vendor
                                    </button>

                                    <button type="button"
                                            class="btn login-btn flex-fill"
                                            data-role="admin">
                                        Admin
                                    </button>

                                </div>

                            </div>

                            <!-- ===== Email ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Email Address
                                </label>

                                <div class="input-group">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-regular fa-envelope text-muted"></i>
                                    </span>

                                    <input type="email"
                                           class="form-control border-start-0"
                                           name="email"
                                           placeholder="Enter Your Email"
                                           required>

                                </div>

                            </div>

                            <!-- ===== Password ===== -->
                            <div class="mb-4">

                                <label class="form-label fw-semibold">
                                    Password
                                </label>

                                <div class="input-group has-validation">

                                    <span class="input-group-text border-end-0">
                                        <i class="fa-solid fa-lock text-muted"></i>
                                    </span>

                                    <input type="password"
                                           class="form-control border-start-0 border-end-0"
                                           id="password"
                                           name="password"
                                           placeholder="Enter Your Password"
                                           required>

                                    <button type="button"
                                            class="input-group-text border-start-0 toggle-password"
                                            data-target="password">
                                        <i class="fa-regular fa-eye text-muted"></i>
                                    </button>

                                    <div class="invalid-feedback"></div>
                                    <div class="valid-feedback"></div>

                                </div>

                            </div>

                            <!-- ===== Remember & Forgot ===== -->
                            <div class="d-flex justify-content-between align-items-center mb-4">

                                <div class="form-check">
                                    <input class="form-check-input"
                                           type="checkbox"
                                           name="remember">
                                    <label class="form-check-label">
                                        Remember me
                                    </label>
                                </div>

                                <a href="./reset.html"
                                   class="small text-decoration-none">
                                    Forgot password?
                                </a>

                            </div>

                            <!-- ===== Submit ===== -->
                            <div class="d-grid mb-3">

                                <button type="submit"
                                        class="btn btn-primary py-2">
                                    Sign In
                                </button>

                            </div>

                            <p class="text-center mt-3 small">
                                Don’t have an account?
                                <a href="./register.html"
                                   class="text-decoration-none">
                                    Sign up
                                </a>
                            </p>

                        </form>

                    </div>

                </div>

            </div>
        </div>

    </body>
</html>

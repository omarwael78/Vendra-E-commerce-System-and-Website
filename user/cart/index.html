<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Vendra | Shopping Cart</title>
  <link rel="icon" type="image/x-icon" href="../../assets/vendra.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Jquery -->
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"></script>
  <!-- Font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="../../assets/css/global.css">
  <script src="main.js" type="module"></script>

</head>

<body class="d-flex flex-column min-vh-100">
  <!-- ===== Page Layout ===== -->
  <div class="container py-5">
    <h2 class="fw-bold mb-4">Shopping Cart</h2>

    <div class="row g-4 justify-content-between">

      <!-- Cart Items -->
      <div class="col-12 col-xl-7 shadow-sm p-5">
        <div id="mainCartWrapper" class="cart-card"></div>
        <a href="../products/index.html" class="text-decoration-none d-block mt-3">
          ← Continue Shopping
        </a>
      </div>

      <!-- Summary -->
      <div class="col-12 col-xl-4 shadow-sm p-5">
        <div class="summary-card p-4">
          <h5 class="fw-bold mb-3">Order Summary</h5>

          <div class="d-flex justify-content-between mb-2">
            <span>Subtotal</span>
            <span id="subtotal">$0.00</span>
          </div>

          <div class="d-flex justify-content-between mb-2">
            <span>Shipping</span>
            <span class="text-success">FREE</span>
          </div>

          <div class="d-flex justify-content-between mb-3">
            <span>Tax (8%)</span>
            <span id="tax">$0.00</span>
          </div>

          <hr>

          <div class="d-flex justify-content-between fw-bold fs-5 mb-3">
            <span>Total</span>
            <span class="text-primary" id="total">$0.00</span>
          </div>

          <a id="checkout" class="btn btn-primary w-100 py-2">
            Proceed to Checkout
          </a>

          <p class="text-center text-muted small mt-2">
            Secure checkout powered by Stripe
          </p>
        </div>
      </div>

    </div>
  </div>

</body>

</html>

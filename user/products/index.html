<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendra | Products</title>
  <link rel="icon" type="image/x-icon" href="../../assets//vendra.png">
  <!-- Jquery -->
  <script src="https://code.jquery.com/jquery-4.0.0.min.js"
    integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
    integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
    crossorigin="anonymous"></script>
  <!-- Font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />

  <link rel="stylesheet" href="./css/style.css">
  <link rel="stylesheet" href="../../assets/css/global.css">
</head>

<body>
  <div id="mainWrapper">

    <div class="container-fluid py-4">

      <div class="products-header shadow-lg mb-4 d-flex justify-content-between flex-column flex-lg-row">
        <div>
          <h5 class="mb-1">All Products</h5>
          <p class="mb-0 text-muted" id="productsCount"></p>
          <br>

          <!-- 🔙 Back to Home -->
          <a href="../../index.html" class="text-decoration-none fw-bold">
            ← Back to Home
          </a>
        </div>
        <!-- Search -->
        <input class="form-control rounded w-75 align-self-center  my-3" type="search" placeholder="Search products...">

      </div>

      <div class="row">
        <!-- Filters -->
        <aside class="col-md-3" id="filters"></aside>
        <!-- Products -->
        <main class="col-md-9">
          <!-- Sort -->
          <div class="sort-wrapper mb-3">
            <div class="sort-card shadow-lg">
              <span>Sort by:</span>
              <select class="form-select w-25" id="sortSelect">
                <option value="featured" selected>Featured</option>
                <option value="low">Price: Low to High</option>
                <option value="high">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
              </select>
            </div>
          </div>

          <div id="products" class="row g-4">
            <div class="w-100 d-flex justify-content-center align-items-center" style="height: 50vh;">
              <div class="spinner-border text-body " role="status"
                style="height: 100px !important; width: 100px !important;">
                <span class="visually-hidden">Loading...</span>
              </div>
            </div>
          </div>
          <div id="pagination" class="mt-4 text-center"></div>

        </main>

      </div>
    </div>
    <!-- JS Files -->
    <script src="./js/filters.js"></script>
    <script src="./js/app.js" type="module"></script>
  </div>

</body>

</html>

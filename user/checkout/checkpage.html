<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="../../assets/vendra.png">

    <title>Vendra | checkout Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="checkpage.css">
    <link rel="stylesheet" href="../../assets/css/global.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="checkpage.js" type="module"></script>



</head>

<body>
    <main class="container py-5">
        <h2 class="mb-4 fw-bold ">Checkout</h2>
        <div class="row g-4">

            <div class="col-lg-8">
                <form id="checkoutForm">


                    <div class="card shadow-lg border-0 p-4">
                        <div class="d-flex justify-content-between align-items-center mb-4">
                            <h5 class="card-title fw-bold mb-0">Payment Information</h5>
                            <i class="fas fa-lock text-success"></i>
                        </div>
                        <div class="row g-3">
                            <div class="col-12">
                                <label class="form-label text-muted small">Card Number *</label>
                                <div class="input-group">
                                    <span class="input-group-text  text-muted"><i class="far fa-credit-card"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" id="cardNumber"
                                        placeholder="1234 5678 9012 3456">
                                </div>
                            </div>
                            <div class="col-12">
                                <label class="form-label text-muted small">Cardholder Name *</label>
                                <input type="text" class="form-control" id="cardName" placeholder="John Doe">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">Expiry Date *</label>
                                <input type="text" class="form-control" id="expiryDate" placeholder="MM/YY">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label text-muted small">CVV *</label>
                                <input type="password" class="form-control" id="cvv" placeholder="123">
                            </div>
                            <div class="col-12 mt-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="saveCard">
                                    <label class="form-check-label text-muted small" for="saveCard">
                                        Save card for future purchases
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>

            <div class="col-lg-4 z-1" id="orderSummery">
                <div class="card shadow-lg border-0 p-4 sticky-top" style="top: 75px;">
                    <h5 class="card-title fw-bold mb-4">Order Summary</h5>

                    <div id="orderItemsContainer" class="mb-4 border-bottom pb-3">
                    </div>

                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Subtotal</span>
                        <span id="subtotal" class="fw-medium"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-2">
                        <span class="text-muted">Shipping</span>
                        <span id="shipping" class="text-success fw-bold"></span>
                    </div>
                    <div class="d-flex justify-content-between mb-4 border-bottom pb-3">
                        <span class="text-muted">Tax (8%)</span>
                        <span id="tax" class="fw-medium"></span>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold mb-0">Total</h5>
                        <h5 id="totalPrice" class="fw-bold text-primary mb-0"></h5>
                    </div>

                    <button type="button" class="btn btn-primary w-100 py-2 fw-bold mb-3" id="placeOrderBtn">
                        <i class="fas fa-lock me-2"></i> Place Order
                    </button>
                    <p class="text-center text-muted" style="font-size: 0.75rem;">
                        By placing your order, you agree to our Terms & Conditions
                    </p>
                </div>
            </div>
        </div>
    </main>

</body>

</html>
